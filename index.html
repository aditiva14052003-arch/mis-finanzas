<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicación para administrar tus finanzas personales">
    <meta name="theme-color" content="#2D5016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mis Finanzas">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%232D5016' width='180' height='180'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>💰</text></svg>">
    <link rel="manifest" href="manifest.json">
    <title>Mis Finanzas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #2D5016 0%, #3a6b1f 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .balance-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .balance-card {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .balance-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .balance-amount {
            font-size: 18px;
            font-weight: bold;
        }

        .balance-card.income { color: #4CAF50; }
        .balance-card.expense { color: #FF6B6B; }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 0 20px;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            transition: all 0.3s;
        }

        .tab.active {
            color: #2D5016;
            border-bottom-color: #2D5016;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .content.active {
            display: block;
        }

        .transaction-form {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2D5016;
            box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            background: #2D5016;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button:active {
            background: #1f3810;
            transform: scale(0.98);
        }

        .transactions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .transaction-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .transaction-item:active {
            background: #f9f9f9;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-description {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .transaction-category {
            font-size: 12px;
            color: #999;
        }

        .transaction-amount {
            font-weight: 600;
            font-size: 16px;
            text-align: right;
        }

        .transaction-amount.income {
            color: #4CAF50;
        }

        .transaction-amount.expense {
            color: #FF6B6B;
        }

        .delete-btn {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 12px;
        }

        .delete-btn:active {
            background: #cc5555;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .chart-container {
            margin-bottom: 30px;
        }

        .chart-title {
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .category-stats {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .stat-value {
            font-weight: 600;
            font-size: 14px;
        }

        .stat-value.income {
            color: #4CAF50;
        }

        .stat-value.expense {
            color: #FF6B6B;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #fff;
            }

            .app-container {
                background: #222;
            }

            .tabs, .transaction-form {
                background: #1a1a1a;
                border-color: #444;
            }

            input, select, .transaction-item, .category-stats {
                background: #2a2a2a;
                border-color: #444;
                color: #fff;
            }

            .tab {
                color: #666;
            }

            .tab.active {
                color: #86c66f;
                border-bottom-color: #86c66f;
            }

            input:focus, select:focus {
                border-color: #86c66f;
                box-shadow: 0 0 0 3px rgba(134, 198, 111, 0.1);
            }

            button {
                background: #2D5016;
            }

            button:active {
                background: #1f3810;
            }

            .stat-row {
                border-bottom-color: #333;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>💰 Mis Finanzas</h1>
            <div class="balance-container">
                <div class="balance-card income">
                    <div class="balance-label">Ingresos</div>
                    <div class="balance-amount" id="totalIncome">$0</div>
                </div>
                <div class="balance-card expense">
                    <div class="balance-label">Gastos</div>
                    <div class="balance-amount" id="totalExpense">$0</div>
                </div>
            </div>
        </header>

        <div class="tabs">
            <div class="tab active" data-tab="dashboard">Dashboard</div>
            <div class="tab" data-tab="add">+ Agregar</div>
            <div class="tab" data-tab="history">Historial</div>
        </div>

        <div class="content active" id="dashboard">
            <div class="chart-container">
                <div class="chart-title">Resumen por Categoría</div>
                <div id="categoriesContainer"></div>
            </div>
        </div>

        <div class="content" id="add">
            <form class="transaction-form" id="transactionForm">
                <div class="form-group">
                    <label>Tipo de Transacción</label>
                    <select id="type" required>
                        <option value="expense">Gasto</option>
                        <option value="income">Ingreso</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Categoría</label>
                    <select id="category" required>
                        <option value="Alimentación">Alimentación</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Entretenimiento">Entretenimiento</option>
                        <option value="Servicios">Servicios</option>
                        <option value="Salud">Salud</option>
                        <option value="Trabajo">Trabajo</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="description" placeholder="Ej: Almuerzo en restaurante" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Monto</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                </div>

                <button type="submit">Guardar Transacción</button>
            </form>
        </div>

        <div class="content" id="history">
            <div id="transactionsList"></div>
        </div>
    </div>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();

        // App State
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        // Tab Navigation
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
                if (tab.dataset.tab === 'history') renderTransactionsList();
                if (tab.dataset.tab === 'dashboard') renderDashboard();
            });
        });

        // Form Submit
        document.getElementById('transactionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newTransaction = {
                id: Date.now(),
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value),
                date: document.getElementById('date').value
            };
            transactions.push(newTransaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            document.getElementById('transactionForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            updateTotals();
            alert('Transacción guardada ✓');
        });

        function updateTotals() {
            const income = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            const expense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            
            document.getElementById('totalIncome').textContent = '$' + income.toFixed(2);
            document.getElementById('totalExpense').textContent = '$' + expense.toFixed(2);
        }

        function renderDashboard() {
            const expenses = transactions.filter(t => t.type === 'expense');
            const categoryTotals = {};
            expenses.forEach(t => {
                categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
            });

            let html = '';
            Object.entries(categoryTotals)
                .sort((a, b) => b[1] - a[1])
                .forEach(([category, amount]) => {
                    html += `
                        <div class="category-stats">
                            <div class="stat-row">
                                <div class="stat-label">${category}</div>
                                <div class="stat-value expense">$${amount.toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                });

            if (expenses.length === 0) {
                html = '<div class="empty-state">📊 Sin transacciones para mostrar</div>';
            }

            document.getElementById('categoriesContainer').innerHTML = html;
        }

        function renderTransactionsList() {
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            let html = '';

            if (sorted.length === 0) {
                html = '<div class="empty-state">📝 No hay transacciones registradas</div>';
            } else {
                html = '<div class="transactions-list">' +
                    sorted.map(t => `
                        <div class="transaction-item">
                            <div class="transaction-info">
                                <div class="transaction-description">${t.description}</div>
                                <div class="transaction-category">${t.category} • ${new Date(t.date).toLocaleDateString('es-UY')}</div>
                            </div>
                            <div class="transaction-amount ${t.type}">${t.type === 'income' ? '+' : '-'}$${t.amount.toFixed(2)}</div>
                            <button class="delete-btn" onclick="deleteTransaction(${t.id})">✕</button>
                        </div>
                    `).join('') +
                    '</div>';
            }

            document.getElementById('transactionsList').innerHTML = html;
        }

        function deleteTransaction(id) {
            if (confirm('¿Eliminar esta transacción?')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('transactions', JSON.stringify(transactions));
                updateTotals();
                renderTransactionsList();
            }
        }

        // Initial render
        updateTotals();
        renderDashboard();
    </script>
</body>
</html>
